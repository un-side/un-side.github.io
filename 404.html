<!-- ルート直下の 404.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        // 1. エラーが起きたことを一応メモリに置く（任意）
        sessionStorage.setItem('error_flag', 'true');

        // 2. メインサイトの index.html を呼び出す。
        // その際、パラメータ ?p= に「エラー用ページのパス」を無理やり流し込む！
        // ※パスの先頭に / を入れないのがコツ（idx.jsの仕様に合わせる）
        location.replace("/index.html?p=assets/404");
    </script>
</head>
<body>
    読み込み中...
</body>
</html>
